version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mynotebook-backend
    ports:
      - "8005:8005"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8005
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend/data:/app/data
      - ./backend/.env:/app/.env
    networks:
      - mynotebook-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mynotebook-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8005
      - HYPERBROWSER_API_KEY=${HYPERBROWSER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL}
      - VEO3_API_KEY=${VEO3_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - VEO_MODEL=${VEO_MODEL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mynotebook-network
    restart: unless-stopped

networks:
  mynotebook-network:
    driver: bridge
